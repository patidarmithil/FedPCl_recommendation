federated:

  total_clients: 6040        # will be overwritten per dataset
  clients_per_round: 128     # paper setting
  communication_rounds: 400  # T = 400

  clustering:
    num_clusters: 5          # K = 5
    algorithm: "kmeans"

  personalization:
    mu_cluster: 0.5          # μ1
    mu_global: 0.5           # μ2

loss:

  beta_contrastive: 1.0      # β1
  lambda_item: 1.0           # λ (Eq.7)

evaluation:
  top_k: 10
  negative_samples: 100
